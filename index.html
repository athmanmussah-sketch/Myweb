<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkX Video Downloader - Web App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --dark: #1e1e2f;
            --light: #f8f9fa;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: 20px 0;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        
        .developer-badge {
            background: var(--dark);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
        }
        
        .url-input-group {
            background: white;
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .url-input-group input {
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            border-radius: 50px;
            width: 100%;
        }
        
        .url-input-group input:focus {
            outline: none;
        }
        
        .quality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .quality-card {
            background: var(--light);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .quality-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }
        
        .quality-card.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, #f8f9fa 0%, #e8eaf6 100%);
        }
        
        .quality-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .format-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .format-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .format-btn:hover {
            border-color: var(--primary);
        }
        
        .format-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }
        
        .download-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 30px;
        }
        
        .download-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-section {
            background: var(--light);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .progress {
            height: 30px;
            border-radius: 15px;
            background: #e0e0e0;
        }
        
        .progress-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: width 0.3s;
            line-height: 30px;
            font-weight: bold;
        }
        
        .video-info {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--light);
            border-radius: 15px;
        }
        
        .video-thumbnail {
            width: 160px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .downloads-list {
            background: var(--light);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .download-item:last-child {
            border-bottom: none;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>
    
    <div class="main-container">
        <div class="glass-card">
            <div class="text-center">
                <div class="logo">
                    <i class="fas fa-download"></i> DarkX Video Downloader
                </div>
                <div class="developer-badge">
                    <i class="fas fa-user"></i> DarkX Dev | 
                    <i class="fas fa-phone"></i> 255775710774
                </div>
            </div>
            
            <!-- URL Input -->
            <div class="url-input-group">
                <input type="text" id="videoUrl" placeholder="Paste YouTube URL here..." class="form-control">
            </div>
            
            <!-- Video Info -->
            <div id="videoInfo" style="display: none;" class="video-info">
                <img id="thumbnail" class="video-thumbnail" src="" alt="Thumbnail">
                <div>
                    <h5 id="videoTitle"></h5>
                    <p><i class="fas fa-user"></i> <span id="videoUploader"></span></p>
                    <p><i class="far fa-clock"></i> <span id="videoDuration"></span></p>
                </div>
            </div>
            
            <!-- Quality Options -->
            <h5 class="mb-3"><i class="fas fa-tachometer-alt"></i> Quality:</h5>
            <div class="quality-grid">
                <div class="quality-card selected" onclick="selectQuality(this, '2160p')">
                    <div class="quality-icon">🔥</div>
                    <h6>4K Ultra HD</h6>
                    <small>2160p</small>
                </div>
                <div class="quality-card" onclick="selectQuality(this, '1080p')">
                    <div class="quality-icon">💫</div>
                    <h6>Full HD</h6>
                    <small>1080p</small>
                </div>
                <div class="quality-card" onclick="selectQuality(this, '720p')">
                    <div class="quality-icon">✨</div>
                    <h6>HD</h6>
                    <small>720p</small>
                </div>
                <div class="quality-card" onclick="selectQuality(this, '480p')">
                    <div class="quality-icon">📱</div>
                    <h6>Mobile</h6>
                    <small>480p</small>
                </div>
            </div>
            
            <!-- Format Options -->
            <h5 class="mb-3"><i class="fas fa-file"></i> Format:</h5>
            <div class="format-buttons">
                <button class="format-btn active" onclick="selectFormat('mp4', this)">📹 MP4 Video</button>
                <button class="format-btn" onclick="selectFormat('mp3', this)">🎵 MP3 Audio</button>
                <button class="format-btn" onclick="selectFormat('mkv', this)">🎬 MKV Video</button>
            </div>
            
            <!-- Download Button -->
            <button class="download-btn" onclick="startDownload()" id="downloadBtn">
                <i class="fas fa-download"></i> DOWNLOAD NOW
            </button>
            
            <!-- Progress Section -->
            <div id="progressSection" class="progress-section">
                <h5><i class="fas fa-spinner fa-spin"></i> Downloading...</h5>
                <div class="progress mb-2">
                    <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
                </div>
                <div id="progressDetails" class="text-center">Initializing...</div>
            </div>
            
            <!-- Downloads List -->
            <div id="downloadsList" class="downloads-list" style="display: none;">
                <h5><i class="fas fa-history"></i> Your Downloads</h5>
                <div id="downloadItems"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>
                <i class="fas fa-code"></i> Developed by <strong>DarkX Dev</strong> | 
                <i class="fas fa-phone"></i> 255775710774 |
                <i class="fab fa-github"></i> @athmanmussah-sketch
            </p>
        </div>
    </div>
    
    <script>
        let selectedQuality = '2160p';
        let selectedFormat = 'mp4';
        let currentDownloadId = null;
        let progressInterval = null;
        
        // Auto-fetch video info when URL is pasted
        let urlTimeout;
        document.getElementById('videoUrl').addEventListener('input', function() {
            clearTimeout(urlTimeout);
            urlTimeout = setTimeout(fetchVideoInfo, 1000);
        });
        
        function selectQuality(element, quality) {
            document.querySelectorAll('.quality-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            selectedQuality = quality;
        }
        
        function selectFormat(format, element) {
            document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            selectedFormat = format;
        }
        
        async function fetchVideoInfo() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) return;
            
            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('videoInfo').style.display = 'flex';
                    document.getElementById('thumbnail').src = data.thumbnail;
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('videoUploader').textContent = data.uploader;
                    
                    const minutes = Math.floor(data.duration / 60);
                    const seconds = data.duration % 60;
                    document.getElementById('videoDuration').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            } catch (error) {
                console.error('Error fetching video info:', error);
            }
        }
        
        async function startDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) {
                showNotification('Please enter a URL!', 'error');
                return;
            }
            
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('progressSection').style.display = 'block';
            
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url: url,
                        quality: selectedQuality,
                        format: selectedFormat
                    })
                });
                
                const data = await response.json();
                currentDownloadId = data.download_id;
                
                // Start checking progress
                progressInterval = setInterval(checkProgress, 1000);
                
            } catch (error) {
                console.error('Download error:', error);
                showNotification('Download failed!', 'error');
                resetDownload();
            }
        }
        
        async function checkProgress() {
            if (!currentDownloadId) return;
            
            try {
                const response = await fetch(`/api/progress/${currentDownloadId}`);
                const data = await response.json();
                
                if (data.status === 'completed' || data.status === 'finished') {
                    clearInterval(progressInterval);
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('progressBar').textContent = '100%';
                    document.getElementById('progressDetails').textContent = 'Download complete!';
                    
                    // Download the file
                    if (data.filename) {
                        const filename = data.filename.split('/').pop();
                        window.location.href = `/api/download-file/${filename}`;
                    }
                    
                    showNotification('✅ Download completed!', 'success');
                    resetDownload();
                    loadDownloads();
                    
                } else if (data.status === 'error') {
                    clearInterval(progressInterval);
                    showNotification(`❌ Error: ${data.error}`, 'error');
                    resetDownload();
                    
                } else if (data.percent !== undefined) {
                    document.getElementById('progressBar').style.width = data.percent + '%';
                    document.getElementById('progressBar').textContent = data.percent + '%';
                    
                    if (data.speed) {
                        const speedMB = (data.speed / 1024 / 1024).toFixed(2);
                        document.getElementById('progressDetails').textContent = 
                            `Speed: ${speedMB} MB/s | ETA: ${data.eta || '?'}s`;
                    }
                }
            } catch (error) {
                console.error('Progress check error:', error);
            }
        }
        
        function resetDownload() {
            document.getElementById('downloadBtn').disabled = false;
            currentDownloadId = null;
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }
        
        function loadDownloads() {
            // Load completed downloads from localStorage
            const downloads = JSON.parse(localStorage.getItem('downloads') || '[]');
            if (downloads.length > 0) {
                document.getElementById('downloadsList').style.display = 'block';
                let html = '';
                downloads.slice(-5).reverse().forEach(d => {
                    html += `
                        <div class="download-item">
                            <span><i class="fas fa-check-circle text-success"></i> ${d.title.substring(0, 30)}...</span>
                            <small>${d.date}</small>
                        </div>
                    `;
                });
                document.getElementById('downloadItems').innerHTML = html;
            }
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.backgroundColor = type === 'error' ? '#f8d7da' : type === 'success' ? '#d4edda' : 'white';
            notification.style.color = type === 'error' ? '#721c24' : type === 'success' ? '#155724' : 'black';
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // Load previous downloads on page load
        window.onload = function() {
            loadDownloads();
        };
    </script>
</body>
</html>
